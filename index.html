<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Briks</title>
    <link rel="icon" type="image/svg+xml" href="space-icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <h1>The Briks</h1>
        <p class="subtitle">Vesoljska igra z zogico, ploscico in opekami.</p>

        <div class="top-bar">
            <div class="info-box">Tocke: <span id="tocke">0</span></div>
            <div class="info-box">Cas: <span id="cas">00:00</span></div>
            <div class="info-box">Zivljenja: <span id="zivljenja">3</span></div>
        </div>

        <div class="button-row">
            <button id="start-btn">Start</button>
            <button id="restart-btn">Restart</button>
            <button id="navodila-btn">Navodila</button>
            <button id="vizitka-btn">Vizitka</button>
        </div>

        <div id="info-panel" class="info-panel hidden">
            <h2 id="info-title">Navodila</h2>
            <div id="info-text"></div>
        </div>

        <div class="game-frame">
            <canvas id="canvas" width="900" height="560"></canvas>
            <div id="message-box" class="message-box">Klikni Start za zacetek igre.</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
